---
# Install Docker on todoops-app-vm. Run: ansible-playbook playbook.yml -e @vars.yml

- name: Install Docker on ToDoOps application VM
  hosts: todoops
  become: true
  tasks:
    - name: Install Docker from Ubuntu repository
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Start and enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add {{ ansible_user }} to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
