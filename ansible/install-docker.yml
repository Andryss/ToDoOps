---
# Install Docker Engine and Docker Compose v2 plugin (Ubuntu). Run: ansible-playbook install-docker.yml -e @vars.yml

- name: Install Docker and Compose plugin on ToDoOps VM
  hosts: todoops
  become: true
  tasks:
    - name: Install Docker and docker-compose-v2
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Start and enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add {{ ansible_user }} to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
