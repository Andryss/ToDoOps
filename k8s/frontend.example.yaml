# Example frontend manifest. Copy to frontend.yaml and replace YOUR_DOCKERHUB_USER with your image registry path.
#   cp frontend.example.yaml frontend.yaml
#   # Edit frontend.yaml: set image to e.g. youruser/todoops-frontend:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todoops
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_DOCKERHUB_USER/todoops-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_URL
              value: "http://backend:8080/api/"
            - name: API_LOCATION
              value: "/api/"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: todoops
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
