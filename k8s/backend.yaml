# --- Backend Deployment: Spring Boot app. Replace image with your Docker Hub image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: todoops
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: andryss/todoops-backend:20260227-163540
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: todoops-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: todoops-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todoops-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
# --- Backend Service: internal DNS name "backend" for frontend and Ingress.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: todoops
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
