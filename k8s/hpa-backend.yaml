# HorizontalPodAutoscaler for backend: scale on CPU > 15% (min 1, max 5 replicas).
# Requires backend Deployment to have resources.requests.cpu set (e.g. 100m).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: todoops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 15
