# Example secret for ToDoOps (PostgreSQL in cluster + backend).
# Copy to secret.yaml and set a safe POSTGRES_PASSWORD, then apply.
#   cp secret.example.yaml secret.yaml
#   kubectl apply -f k8s/secret.yaml
#
# PostgreSQL runs in-cluster (StatefulSet). Backend connects via Service "postgres:5432".
---
apiVersion: v1
kind: Secret
metadata:
  name: todoops-secrets
  namespace: todoops
type: Opaque
stringData:
  # PostgreSQL container (StatefulSet) and backend JDBC
  POSTGRES_USER: "todoops"
  POSTGRES_PASSWORD: "<SET_SAFE_PASSWORD>"
  POSTGRES_DB: "todoops"
  # Backend Spring datasource (same DB/user as above)
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/todoops"
  SPRING_DATASOURCE_USERNAME: "todoops"
  SPRING_DATASOURCE_PASSWORD: "<SET_SAFE_PASSWORD>"
