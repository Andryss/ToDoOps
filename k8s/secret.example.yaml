# Example secret. Copy to secret.yaml and replace placeholders with your values.
#   cp secret.example.yaml secret.yaml
# Then edit secret.yaml and apply: kubectl apply -f k8s/secret.yaml
#
# DB: create a PostgreSQL cluster in Yandex Cloud, create DB and user, then set:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: todoops-secrets
  namespace: todoops
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://<YANDEX_PG_HOST>:6432/<DB_NAME>"
  SPRING_DATASOURCE_USERNAME: "<DB_USER>"
  SPRING_DATASOURCE_PASSWORD: "<DB_PASSWORD>"
