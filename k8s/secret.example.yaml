# Example secret for ToDoOps.
---
apiVersion: v1
kind: Secret
metadata:
  name: todoops-secrets
  namespace: todoops
type: Opaque
stringData:
  # PostgreSQL container
  POSTGRES_USER: "todoops"
  POSTGRES_PASSWORD: "<SET_SAFE_PASSWORD>"
  POSTGRES_DB: "todoops"
  # Backend Spring datasource (same DB/user as above)
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/todoops"
  SPRING_DATASOURCE_USERNAME: "todoops"
  SPRING_DATASOURCE_PASSWORD: "<SET_SAFE_PASSWORD>"
  # Grafana admin
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "<SET_SAFE_PASSWORD>"
