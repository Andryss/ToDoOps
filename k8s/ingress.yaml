# Ingress: routes HTTP traffic to the frontend (which proxies /api/v1 to the backend).
# Apply after the NGINX Ingress Controller is installed (see k8s/README.md §3).
# Yandex NLB + ingress-nginx: https://yandex.cloud/en/docs/managed-kubernetes/operations/create-load-balancer-with-ingress-nginx
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todoops
  namespace: todoops
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    # No host = match any host (access via http://<EXTERNAL-IP>). Add host: "your-domain.com" when you have DNS.
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
